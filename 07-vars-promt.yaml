- name: vars in promt
  hosts: local
  connection: local
  vars_prompt:
  - name: username
    prompt: what is your username?
    private: false

  - name: password
    prompt: enter your password
    private: true

  tasks:
  - name: vars in promt
    ansible.builtin.debug:
      msg: "the username is {{ username }} and password is {{ password }}"
