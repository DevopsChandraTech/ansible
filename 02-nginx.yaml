- name: install and start nginx
  hosts: frontend
  become: yes # we provide become: yes into playbook ansible automatically runs with root priviliges 
  tasks:
  - name: nginx install
    ansible.builtin.package: # it is a built in modules in ansible documentation
      name: nginx
      state: present

  - name: start and enable service
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes